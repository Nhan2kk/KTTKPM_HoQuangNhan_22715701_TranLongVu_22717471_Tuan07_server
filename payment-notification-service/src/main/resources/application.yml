spring:
  application:
    name: payment-notification-service
  
  datasource:
    url: jdbc:mariadb://localhost:3306/payment_notification
    username: root
    password: 
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    dialect: org.hibernate.dialect.MariaDBDialect
    properties:
      hibernate:
        show_sql: false
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8083
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    fit.se: DEBUG
