server:
  port: 8081

spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:mariadb://localhost:3306/service_booking
    driver-class-name: org.mariadb.jdbc.Driver
    username: root
    password:

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # RabbitMQ Configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

logging:
  level:
    root: INFO
    fit.se.bookingservice: DEBUG
    org.springframework.amqp: DEBUG
    org.springframework.rabbit: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
